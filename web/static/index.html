<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherVault Web</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

    <div id="auth-view" class="view active">
        <div class="auth-card glass">
            <h1 class="logo">CipherVault</h1>
            <p class="subtitle">Secure Local Password Management</p>
            
            <div class="tabs">
                <button class="tab-btn active" onclick="switchAuthTab('login')">Login</button>
                <button class="tab-btn" onclick="switchAuthTab('register')">Register</button>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <input type="hidden" id="auth-mode" value="login">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="master_password">Master Password</label>
                    <input type="password" id="master_password" autocomplete="current-password">
                </div>
                <div id="auth-error" class="error-msg"></div>
                <button type="submit" class="primary-btn" id="auth-submit-btn">Login</button>
            </form>
            
            <div style="margin: 1.5rem 0; color: var(--text-muted); font-size: 0.9rem;">— OR —</div>
            
            <a href="/api/auth/google/login" class="primary-btn" style="background: white; color: #333; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 0.5rem; width: 100%;">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                Continue with Google
            </a>
        </div>
    </div>

    <!-- UNLOCK VIEW -->
    <div id="unlock-view" class="view">
        <div class="auth-card glass" style="margin: auto;">
            <h1 class="logo">Unlock Vault</h1>
            <p class="subtitle" id="unlock-subtitle">Please enter your master password to decrypt your vault.</p>
            
            <form id="unlock-form" onsubmit="handleUnlock(event)">
                <div class="input-group">
                    <label for="unlock_password">Master Password</label>
                    <input type="password" id="unlock_password" required>
                </div>
                <div id="unlock-error" class="error-msg"></div>
                <button type="submit" class="primary-btn">Unlock Vault</button>
            </form>
            
            <div style="margin-top: 1.5rem;">
                <button type="button" class="text-btn" onclick="logout()">Sign out</button>
            </div>
        </div>
    </div>

    <div id="app-view" class="view">
        <header class="glass-header">
            <h1 class="logo">CipherVault</h1>
            <div class="header-actions">
                <span id="current-user"></span>
                <button onclick="logout()" class="text-btn">Logout</button>
            </div>
        </header>

        <main class="container">
            <div class="action-bar">
                <div class="search-wrapper">
                    <input type="text" id="search-input" placeholder="Search entries..." onkeyup="filterEntries()">
                </div>
                <button onclick="openModal('add-modal')" class="primary-btn">+ Add Entry</button>
            </div>

            <div id="entries-list" class="entries-grid">
                <!-- Entries will be dynamically populated here -->
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="add-modal" class="modal">
        <div class="modal-content glass">
            <h2>Add Entry</h2>
            <form id="add-form" onsubmit="handleAddEntry(event)">
                <div class="input-group">
                    <label for="entry-name">Title / Website Name</label>
                    <input type="text" id="entry-name" required>
                </div>
                <div class="input-group">
                    <label for="entry-username">Username / Email</label>
                    <input type="text" id="entry-username" required>
                </div>
                <div class="input-group">
                    <label for="entry-password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="entry-password" required>
                        <button type="button" class="icon-btn" onclick="togglePasswordVisibility('entry-password')">👁️</button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="entry-notes">Notes (Optional)</label>
                    <textarea id="entry-notes"></textarea>
                </div>
                <div id="add-error" class="error-msg"></div>
                <div class="modal-actions">
                    <button type="button" class="text-btn" onclick="closeModal('add-modal')">Cancel</button>
                    <button type="submit" class="primary-btn">Save Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
